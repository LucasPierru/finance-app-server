services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_app
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/seed-categories.sql:/docker-entrypoint-initdb.d/02-seed-categories.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
